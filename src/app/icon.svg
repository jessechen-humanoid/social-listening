  <!-- 波浪尾巴 -->
  <rect x="2" y="24" width="6" height="2"/>
  <rect x="12" y="24" width="8" height="2"/>
  <rect x="24" y="24" width="6" height="2"/>
  <rect x="4" y="26" width="4" height="2"/>
  <rect x="14" y="26" width="4" height="2"/>
